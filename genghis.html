<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Genghis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    .site {
      background: #f5c800;
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      color: #111;
      display: flex;
      flex-direction: column; 
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2.5rem;
      background: #111;
      border-bottom: 4px solid #f5c800;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 4px;
      color: #f5c800;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: #f5c800; }
    
    .checker-stripe {
      height: 44px;
      background-image:
        linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111),
        linear-gradient(45deg, #111 25%, transparent 25%, transparent 75%, #111 75%, #111);
      background-position: 0 0, 22px 22px;
      background-size: 44px 44px;
      background-color: #fff;
    }

    .page-header {
      background: #111;
      padding: 4rem 2.5rem 3rem;
      text-align: center;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 6vw, 64px);
      letter-spacing: 2px;
      color: #f5f5f5;
    }

    .page-title .accent { color: #f5c800; }

    .content-wrapper {
      flex: 1;
      padding: 4rem 2.5rem;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .embed-controls {
      display: flex;
      gap: 1rem;
      background: #111;
      padding: 1.5rem;
      border: 4px solid #111;
      box-shadow: 8px 8px 0px #111;
    }

    .embed-input {
      flex: 1;
      background: #222;
      border: 2px solid #444;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.15s;
    }

    .embed-input:focus {
      border-color: #f5c800;
    }

    .embed-button {
      background: #f5c800;
      color: #111;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 0 24px;
      border: 2px solid #f5c800;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .embed-button:hover {
      background: #111;
      color: #f5c800;
    }

    .video-card {
      background: #111;
      border: 4px solid #111;
      box-shadow: 8px 8px 0px #111;
      padding: 1rem;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      background: #000;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .error-msg {
      color: #ff4444;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      margin-top: 0.5rem;
      display: none;
    }

    footer {
      background: #111;
      border-top: 4px solid #f5c800;
      padding: 1.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4rem;
    }

    .footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 4px;
      color: #f5c800;
    }

    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #444;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="site">
    
    <nav>
      <a href="/" class="logo">ADCIUM</a>
      <ul class="nav-links">
        <li><a href="/music">Music</a></li>
        <li><a href="/videos">Videos</a></li>
        <li><a href="/gallery">Gallery</a></li>
        <li><a href="/games">Games</a></li>
        <li><a href="/people_i_like">People I Like</a></li>
        <li><a href="/about">About</a></li>
      </ul>
    </nav>

    <div class="checker-stripe"></div>

    <div class="page-header">
      <h1 class="page-title">Genghis Khan Beyblade<span class="accent"> Obby (ULTRA HARD)</span></h1>
    </div>

    <div class="content-wrapper">
      
      <div class="video-card">
        <div class="video-wrapper">
          <iframe width="560" height="315" src="https://www.youtube.com/embed/-D_a797nEEU?si=r6BUcrwfUu58aFRq" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
      </div>

    </div>

    <footer>
      <div class="footer-logo">ADCIUM</div>
      <p class="footer-text">adcium.com &nbsp;·&nbsp; all rights reserved</p>
    </footer>

  </div>

  <script>
    const embedBtn = document.getElementById('embed-btn');
    const urlInput = document.getElementById('youtube-url');
    const videoFrame = document.getElementById('video-frame');
    const errorText = document.getElementById('error-text');

    function extractVideoID(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    embedBtn.addEventListener('click', () => {
        const url = urlInput.value.trim();
        const videoID = extractVideoID(url);

        if (videoID) {
            videoFrame.src = `https://www.youtube.com/embed/${videoID}`;
            errorText.style.display = 'none';
        } else if (url !== '') {
            errorText.style.display = 'block';
        }
    });

    urlInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            embedBtn.click();
        }
    });
  </script>
</body>
</html>
