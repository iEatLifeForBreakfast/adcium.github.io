<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- 1. Instant Meta Refresh Redirect -->
    <meta http-equiv="refresh" content="0; url=https://www.youtube.com/watch?v=dQw4w9WgXcQ">
    <link rel="canonical" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
</head>
<body>
    <!-- 2. JavaScript Fallback Backup -->
    <script>
        window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
    </script>
    
    <!-- 3. Manual link if everything else fails -->
    <p>If you are not redirected automatically, follow this <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ">trust</a>.</p>
</body>
</html>
